<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ARGO — Ordina al Tavolo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D3B66;--neon:#1D70FF;--sand:#D9C7A3;--carbon:#111;--green:#22c55e;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--carbon);color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden}
/* HEADER */
.header{background:var(--navy);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.4)}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff}
.header-logo span{color:var(--sand)}
.header-table{background:rgba(217,199,163,.15);border:1px solid rgba(217,199,163,.3);color:var(--sand);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;display:none}
.header-cart{background:var(--neon);color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:800;cursor:pointer;display:none;gap:6px;align-items:center}
.header-cart.visible{display:flex}
.cart-badge{background:#fff;color:var(--neon);width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}

/* TABLE SELECTION SCREEN */
#table-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:32px 20px;text-align:center}
.ts-flag{font-size:48px;margin-bottom:16px}
.ts-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:#fff;margin-bottom:8px;letter-spacing:1px}
.ts-sub{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:36px}
.table-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:380px;width:100%;margin-bottom:24px}
.table-btn{background:#1a1a1a;border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:20px 8px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:rgba(255,255,255,.8);cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.table-btn:hover,.table-btn:active{background:var(--navy);border-color:var(--sand);color:var(--sand)}
.table-btn small{font-family:'Inter',sans-serif;font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.ts-other{color:rgba(255,255,255,.4);font-size:13px;margin-top:8px}
.ts-other a{color:var(--sand);cursor:pointer;text-decoration:underline}

/* MENU PAGE */
#menu-screen{display:none;padding-bottom:100px}
.menu-filters{display:flex;gap:8px;overflow-x:auto;padding:16px 16px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.menu-filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:8px 18px;border-radius:20px;border:1.5px solid rgba(255,255,255,.12);background:transparent;font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.6);white-space:nowrap;transition:.2s}
.filter-btn.active{background:var(--sand);border-color:var(--sand);color:var(--navy)}
.menu-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.menu-item{background:#1a1a1a;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:.2s}
.menu-item:active{background:#222}
.menu-item-left{flex:1;min-width:0}
.menu-item-name{font-weight:700;font-size:15px;color:#fff;margin-bottom:4px;line-height:1.3}
.menu-item-desc{font-size:12px;color:rgba(255,255,255,.4);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.menu-item-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;margin-bottom:4px;letter-spacing:.3px}
.badge-hot{background:#ef444422;color:#ef4444;border:1px solid #ef444433}
.badge-best{background:rgba(217,199,163,.15);color:var(--sand);border:1px solid rgba(217,199,163,.3)}
.badge-veg{background:#22c55e22;color:#22c55e;border:1px solid #22c55e33}
.badge-new{background:rgba(29,112,255,.2);color:var(--neon);border:1px solid rgba(29,112,255,.3)}
.menu-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.menu-item-price{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--sand)}
.qty-control{display:flex;align-items:center;gap:8px}
.qty-btn{width:32px;height:32px;border-radius:50%;border:none;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.qty-minus{background:rgba(255,255,255,.1);color:#fff}
.qty-minus:active{background:rgba(255,255,255,.2)}
.qty-plus{background:var(--neon);color:#fff}
.qty-plus:active{background:#1558cc}
.qty-num{font-size:16px;font-weight:800;min-width:20px;text-align:center;color:#fff}
.cat-header{padding:20px 16px 8px;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--sand);letter-spacing:1px;display:flex;align-items:center;gap:10px}
.cat-header::after{content:'';flex:1;height:1px;background:rgba(217,199,163,.2)}

/* CART BOTTOM */
#cart-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--navy);padding:16px 20px;z-index:200;border-top:1px solid rgba(255,255,255,.08);display:none;box-shadow:0 -4px 20px rgba(0,0,0,.4)}
#cart-bottom.visible{display:block}
.cart-summary{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cart-summary-left{font-size:14px;color:rgba(255,255,255,.7)}
.cart-summary-total{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--sand)}
.send-btn{width:100%;background:var(--sand);color:var(--navy);border:none;padding:18px;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:.2s;display:flex;align-items:center;justify-content:center;gap:10px}
.send-btn:active{background:#c9b48e;transform:scale(.98)}

/* ORDER SENT SCREEN */
#success-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:32px 20px;text-align:center}
.success-icon{font-size:72px;margin-bottom:20px;animation:bounce .6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--green);margin-bottom:12px}
.success-sub{color:rgba(255,255,255,.6);font-size:15px;line-height:1.7;margin-bottom:32px}
.order-ticket{background:#1a1a1a;border:2px solid rgba(217,199,163,.3);border-radius:16px;padding:24px;max-width:320px;width:100%;margin-bottom:28px;text-align:left}
.ticket-num{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--sand);text-align:center;margin-bottom:4px}
.ticket-table{text-align:center;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px}
.ticket-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px}
.ticket-item:last-child{border:none}
.ticket-total{display:flex;justify-content:space-between;padding:12px 0 0;font-weight:800;font-size:16px;color:var(--sand);border-top:2px solid rgba(217,199,163,.3);margin-top:8px}
.new-order-btn{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:#fff;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.new-order-btn:active{background:rgba(255,255,255,.15)}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">ARGO <span>GREEK</span></div>
  <div class="header-table" id="header-table">📍 Tavolo —</div>
  <button class="header-cart" id="header-cart" onclick="scrollToCart()">
    🛒 <span class="cart-badge" id="cart-badge">0</span>
    <span id="cart-total-mini">€0</span>
  </button>
</div>

<!-- SCELTA TAVOLO -->
<div id="table-screen">
  <div class="ts-flag">🇬🇷</div>
  <div class="ts-title">SCEGLI IL TUO TAVOLO</div>
  <div class="ts-sub">Seleziona il numero del tavolo per iniziare a ordinare</div>
  <div class="table-grid" id="table-grid"></div>
  <div class="ts-other">Non trovi il tuo tavolo? <a onclick="customTable()">Inserisci manualmente</a></div>
</div>

<!-- MENU -->
<div id="menu-screen">
  <div class="menu-filters" id="menu-filters"></div>
  <div id="menu-content"></div>
</div>

<!-- ORDINE INVIATO -->
<div id="success-screen">
  <div class="success-icon">✅</div>
  <div class="success-title">ORDINE INVIATO!</div>
  <p class="success-sub">Il tuo ordine è stato inviato in cucina.<br>Ti raggiungiamo noi al tavolo!</p>
  <div class="order-ticket" id="order-ticket"></div>
  <button class="new-order-btn" onclick="newOrder()">+ Aggiungi altri piatti</button>
</div>

<!-- CART BOTTOM -->
<div id="cart-bottom">
  <div class="cart-summary">
    <div class="cart-summary-left">
      <span id="cart-count-label">0 piatti</span>
    </div>
    <div class="cart-summary-total" id="cart-total-label">€0.00</div>
  </div>
  <button class="send-btn" onclick="sendOrder()">
    📲 Invia Ordine in Cucina
  </button>
</div>

<script>
const WHATSAPP_NUM = '393512204268';
let selectedTable = null;
let menuData = [];
let cart = {}; // {id: qty}
let activeFilter = 'Tutte';
let orderCounter = parseInt(localStorage.getItem('argo_order_num') || '0');

// ---- TABLE GRID ----
function buildTableGrid() {
  const grid = document.getElementById('table-grid');
  const catEmojis = ['🪑','🪑','🪑','🪑','🪑','🪑','🪑','🪑','🪑','🪑','🪑','🪑','🪑','🪑','🪑'];
  for (let i = 1; i <= 15; i++) {
    const btn = document.createElement('button');
    btn.className = 'table-btn';
    btn.innerHTML = `${i}<small>tavolo</small>`;
    btn.onclick = () => selectTable(i);
    grid.appendChild(btn);
  }
}
buildTableGrid();

function customTable() {
  const n = prompt('Numero tavolo:');
  if (n && !isNaN(n)) selectTable(parseInt(n));
}

function selectTable(num) {
  selectedTable = num;
  document.getElementById('table-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'block';
  document.getElementById('header-table').style.display = 'block';
  document.getElementById('header-table').textContent = `📍 Tavolo ${num}`;
  loadMenu();
}

// ---- MENU ----
async function loadMenu() {
  try {
    const r = await fetch('menu.json');
    const d = await r.json();
    menuData = d.items || [];
    renderFilters();
    renderMenu();
  } catch(e) {
    document.getElementById('menu-content').innerHTML = '<p style="text-align:center;padding:40px;color:rgba(255,255,255,.4)">Errore caricamento menu. Ricarica la pagina.</p>';
  }
}

const CAT_EMOJI = {'Pita Carne':'🥙','Pita Vegetariana':'🌿','Piatti':'🍽️','Antipasti':'🫒','Salse':'🥣','Dolci':'🍯','Bevande':'🍺'};
const BADGE_CLASS = {'⭐ Best Seller':'badge-best','🔥 Più ordinato':'badge-hot','🆕 Nuovo':'badge-new','🌿 Veg':'badge-veg','🔥':'badge-hot','👨‍🍳 Chef\'s Choice':'badge-best','🆕':'badge-new'};

function renderFilters() {
  const cats = ['Tutte', ...new Set(menuData.map(i => i.category))];
  document.getElementById('menu-filters').innerHTML = cats.map(c =>
    `<button class="filter-btn${c===activeFilter?' active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(c) {
  activeFilter = c;
  renderFilters();
  renderMenu();
}

function renderMenu() {
  const items = activeFilter === 'Tutte' ? menuData : menuData.filter(i => i.category === activeFilter);
  
  // Group by category
  const groups = {};
  items.forEach(item => {
    if (!groups[item.category]) groups[item.category] = [];
    groups[item.category].push(item);
  });

  let html = '';
  for (const [cat, catItems] of Object.entries(groups)) {
    html += `<div class="cat-header">${CAT_EMOJI[cat]||'🍴'} ${cat}</div>`;
    html += '<div class="menu-list">';
    catItems.forEach(item => {
      const qty = cart[item.id] || 0;
      const badge = item.badge ? `<div class="menu-item-badge ${BADGE_CLASS[item.badge]||'badge-best'}">${item.badge.replace(/[⭐🔥🆕🌿👨‍🍳]/g,'').trim()}</div>` : '';
      html += `
        <div class="menu-item" id="item-${item.id}">
          <div class="menu-item-left">
            ${badge}
            <div class="menu-item-name">${item.name}</div>
            <div class="menu-item-desc">${item.description}</div>
          </div>
          <div class="menu-item-right">
            <div class="menu-item-price">€${item.price.toFixed(2)}</div>
            <div class="qty-control">
              ${qty > 0 ? `<button class="qty-btn qty-minus" onclick="changeQty(${item.id},-1)">−</button><span class="qty-num">${qty}</span>` : ''}
              <button class="qty-btn qty-plus" onclick="changeQty(${item.id},1)">+</button>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
  }
  document.getElementById('menu-content').innerHTML = html;
}

// ---- CART ----
function changeQty(id, delta) {
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  if (cart[id] === 0) delete cart[id];
  renderMenu();
  updateCartUI();
}

function updateCartUI() {
  const items = Object.entries(cart);
  const totalQty = items.reduce((s,[,q]) => s+q, 0);
  const totalPrice = items.reduce((s,[id,q]) => {
    const item = menuData.find(i => i.id === parseInt(id));
    return s + (item ? item.price * q : 0);
  }, 0);

  const cartBottom = document.getElementById('cart-bottom');
  const headerCart = document.getElementById('header-cart');
  const visible = totalQty > 0;
  cartBottom.classList.toggle('visible', visible);
  headerCart.classList.toggle('visible', visible);

  document.getElementById('cart-badge').textContent = totalQty;
  document.getElementById('cart-total-mini').textContent = `€${totalPrice.toFixed(2)}`;
  document.getElementById('cart-count-label').textContent = `${totalQty} piatt${totalQty===1?'o':'i'}`;
  document.getElementById('cart-total-label').textContent = `€${totalPrice.toFixed(2)}`;
}

function scrollToCart() {
  document.getElementById('cart-bottom').scrollIntoView({behavior:'smooth'});
}

// ---- SEND ORDER ----
function sendOrder() {
  if (Object.keys(cart).length === 0) return;

  // Generate order number
  orderCounter++;
  // Reset daily at midnight
  const today = new Date().toDateString();
  const lastDay = localStorage.getItem('argo_order_day');
  if (lastDay !== today) {
    orderCounter = 1;
    localStorage.setItem('argo_order_day', today);
  }
  localStorage.setItem('argo_order_num', orderCounter);

  const orderNum = String(orderCounter).padStart(2, '0');
  const items = Object.entries(cart).map(([id, qty]) => {
    const item = menuData.find(i => i.id === parseInt(id));
    return item ? {name: item.name, qty, price: item.price, subtotal: item.price * qty} : null;
  }).filter(Boolean);

  const total = items.reduce((s, i) => s + i.subtotal, 0);

  // Build WhatsApp message
  let msg = `🔔 *ORDINE #${orderNum} — TAVOLO ${selectedTable}*\n`;
  msg += `━━━━━━━━━━━━━━━━━\n`;
  items.forEach(i => {
    msg += `• ${i.name} x${i.qty} → €${i.subtotal.toFixed(2)}\n`;
  });
  msg += `━━━━━━━━━━━━━━━━━\n`;
  msg += `💰 *TOTALE: €${total.toFixed(2)}*\n`;
  msg += `📍 Tavolo ${selectedTable} | #${orderNum}`;

  // Show success screen
  showSuccess(orderNum, items, total);

  // Open WhatsApp
  const waUrl = `https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`;
  window.open(waUrl, '_blank');
}

function showSuccess(orderNum, items, total) {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('cart-bottom').classList.remove('visible');
  document.getElementById('success-screen').style.display = 'flex';

  let ticketHtml = `
    <div class="ticket-num">#${orderNum}</div>
    <div class="ticket-table">Tavolo ${selectedTable}</div>
  `;
  items.forEach(i => {
    ticketHtml += `<div class="ticket-item"><span>${i.qty}× ${i.name}</span><span>€${i.subtotal.toFixed(2)}</span></div>`;
  });
  ticketHtml += `<div class="ticket-total"><span>Totale</span><span>€${total.toFixed(2)}</span></div>`;
  document.getElementById('order-ticket').innerHTML = ticketHtml;
  cart = {};
}

function newOrder() {
  cart = {};
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'block';
  renderMenu();
  updateCartUI();
}
</script>
</body>
</html>
